name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go test -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg=./ ./...
      - name: Coverage gate (≥90% of auditlog package)
        run: |
          COV=$(go tool cover -func=cover.out | awk '/^total/ {print $NF}' | tr -d '%')
          echo "Coverage: ${COV}%"
          if (( $(echo "$COV < 90" | bc -l) )); then
            echo "::error::Coverage ${COV}% is below 90% gate"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go mod tidy
      - name: Check no drift
        run: git diff --exit-code go.mod go.sum

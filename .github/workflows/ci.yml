name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: go vet (workspace)
        run: go vet ./...
      - name: go build (workspace)
        run: go build ./...
      - name: go test -race (workspace)
        run: go test -race -count=1 ./...
      - name: go vet viz (standalone)
        working-directory: ./viz
        run: go vet ./...
      - name: go build viz (standalone)
        env:
          GOWORK: off
        working-directory: ./viz
        run: go build ./...
      - name: go test -race viz (standalone)
        env:
          GOWORK: off
        working-directory: ./viz
        run: go test -race -count=1 ./...

  coverage:
    name: Coverage gate (≥92%)
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: go test -race with coverage
        run: |
          go test -race -count=1 -coverprofile=cover.out -covermode=atomic -coverpkg=./ ./...
          coverage=$(go tool cover -func=cover.out | awk '/^total/ {print $NF}' | tr -d '%')
          echo "Coverage: ${coverage}%"
          if awk "BEGIN {exit !($coverage < 92.0)}"; then
            echo "::error::Coverage ${coverage}% is below 92% gate"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: golangci-lint (core)
        run: golangci-lint run --timeout=10m ./...
      - name: golangci-lint (viz)
        working-directory: ./viz
        run: golangci-lint run --timeout=10m ./...

  vulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: govulncheck (core)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: govulncheck (viz)
        working-directory: ./viz
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  mod-tidy:
    name: go mod tidy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: go mod tidy (core)
        run: go mod tidy
      - name: go mod tidy (viz)
        working-directory: ./viz
        run: go mod tidy
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::go.sum is out of sync with go.mod. Run 'go mod tidy' in each module and commit the result."
            git diff --stat
            exit 1
          fi

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Run actionlint
        run: actionlint -color

  goreleaser:
    name: goreleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: Install goreleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest
      - name: goreleaser check
        run: goreleaser check

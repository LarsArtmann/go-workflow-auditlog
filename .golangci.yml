version: "2"
run:
  timeout: 5m
  go: 1.26.4
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - clickhouselint
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/Azure/go-workflow
            - github.com/cenkalti/backoff/v4
            - github.com/larsartmann/go-output
            - github.com/larsartmann/go-output/d2
            - github.com/larsartmann/go-output/daghtml
            - github.com/larsartmann/go-output/delimited
            - github.com/larsartmann/go-output/graph
            - github.com/larsartmann/go-output/markdown
            - github.com/larsartmann/go-output/markup
            - github.com/larsartmann/go-output/plantuml
            - github.com/larsartmann/go-output/serialization
            - github.com/larsartmann/go-output/table
            - github.com/larsartmann/go-output/tree
            - github.com/larsartmann/go-error-family
            - github.com/larsartmann/go-workflow-auditlog
            - github.com/larsartmann/go-workflow-auditlog/viz
            - github.com/larsartmann/go-workflow-auditlog/live
            - github.com/larsartmann/go-workflow-auditlog/testhelpers
          files:
            - $all
          list-mode: strict
    exhaustive:
      default-signifies-exhaustive: true
    exhaustruct:
      exclude:
        - os/exec.Cmd
        - github.com/Azure/go-workflow.StepConfig
        - github.com/Azure/go-workflow.RetryOption
        - github.com/larsartmann/go-output.GraphNode
        - github.com/larsartmann/go-output.GraphEdge
        - github.com/larsartmann/go-output.GraphStyle
        - github.com/larsartmann/go-output.NodeStyle
        - github.com/larsartmann/go-output/d2.Node
        - github.com/larsartmann/go-output/d2.Edge
        - github.com/larsartmann/go-output/d2.NodeStyle
        - github.com/larsartmann/go-output/d2.StrokeStyle
        - github.com/larsartmann/go-workflow-auditlog.*
        - net/http.Server
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    makezero:
      always: true
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - tc
        - fn
        - t
        - i
        - m
        - g
        - a
        - b
        - v
        - w
        - s
        - r
        - id
        - f
        - rs
      ignore-type-assert-ok: true
    wrapcheck:
      ignore-package-globs:
        - github.com/larsartmann/go-workflow-auditlog
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
  exclusions:
    generated: lax
    rules:
      - path: example/
        linters:
          - forbidigo
          - mnd
          - cyclop
          - err113
          - exhaustruct
          - varnamelen
          - gochecknoglobals
          - wrapcheck
          - gosec
      - path: demo/
        linters:
          - forbidigo
          - mnd
          - cyclop
          - err113
          - exhaustruct
          - varnamelen
          - gochecknoglobals
          - wrapcheck
          - gosec
          - funlen
          - nlreturn
          - noinlineerr
          - unparam
          - wsl_v5
      - path: _test\.go
        linters:
          - exhaustruct
          - testpackage
          - gochecknoglobals
          - funlen
          - cyclop
          - goconst
          - err113
          - wrapcheck
          - varnamelen
          - mnd
          - gosec
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - _templ\.go$
      - \.gen\.go$
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
